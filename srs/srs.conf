# SRS Configuration
# Docs: https://ossrs.io/lts/en-us/docs/v5/doc/configuration

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled     on;
    listen      1985;
}

http_server {
    enabled     on;
    listen      8080;
    dir         ./objs/nginx/html;
}

stats {
    network     0;
}

vhost __defaultVhost__ {

    # HLS
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    3;
        hls_window      60;
    }

    # Gravação automática
    dvr {
        enabled         on;
        dvr_path        /var/records/[app]/[stream]-[2006]-[01]-[02]-[15]_[04]_[05].flv;
        dvr_plan        segment;
        dvr_duration    60;
        dvr_wait_keyframe on;
    }

    # HTTP callbacks (opcional — comentado por padrão)
    # http_hooks {
    #     enabled         on;
    #     on_publish      http://127.0.0.1:8085/api/v1/streams;
    #     on_unpublish    http://127.0.0.1:8085/api/v1/streams;
    # }
}
