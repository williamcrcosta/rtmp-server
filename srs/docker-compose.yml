services:
  srs:
    image: ossrs/srs:5
    container_name: srs-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8000:8000/udp"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
      - ./index.html:/usr/local/srs/objs/nginx/html/cameras.html:ro
      - records:/var/records
    networks:
      - rtmp-net

  nginx-proxy:
    image: nginx:alpine
    container_name: rtmp-nginx-proxy
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - srs
    networks:
      - rtmp-net

networks:
  rtmp-net:
    driver: bridge

volumes:
  records:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${RECORDS_PATH:-/var/records}
