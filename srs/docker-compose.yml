services:
  srs:
    image: ossrs/srs:5
    container_name: srs-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8000:8000/udp"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf:ro
      - ./index.html:/usr/local/srs/objs/nginx/html/cameras.html:ro
      - records:/var/records
    networks:
      - rtmp-net

  caddy:
    image: caddy:alpine
    container_name: rtmp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - srs
    networks:
      - rtmp-net

networks:
  rtmp-net:
    driver: bridge

volumes:
  records:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${RECORDS_PATH:-/var/records}
  caddy_data:
  caddy_config:
