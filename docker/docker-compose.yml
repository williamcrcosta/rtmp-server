services:
  rtmp:
    image: tiangolo/nginx-rtmp
    container_name: rtmp-server
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - /etc/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - records:/var/records
      - hls:/var/www/html/hls

volumes:
  records:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${RECORDS_PATH:-/var/records}
  hls:
    driver_opts:
      type: tmpfs
      device: tmpfs
