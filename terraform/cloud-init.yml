#cloud-config

# Usuário padrão
users:
  - name: william
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

# Timezone
timezone: America/Sao_Paulo

# Pacotes básicos
packages:
  - curl
  - git
  - ca-certificates
  - gnupg
  - apache2-utils

# Comandos executados na primeira inicialização
runcmd:
  # Instalar Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable --now docker

  # Criar diretórios
  - mkdir -p /var/records
  - chmod 777 /var/records

  # Clonar repositório
  - git clone https://github.com/williamcrcosta/rtmp-server.git /opt/rtmp-server

  # Criar htpasswd com senha padrão (trocar após primeiro login)
  - htpasswd -cb /etc/nginx/.htpasswd admin changeme123

  # Subir SRS
  - docker compose -f /opt/rtmp-server/srs/docker-compose.yml up -d

final_message: |
  ==============================================
  RTMP Server pronto!
  Dashboard: http://$PUBLIC_IPV4:8080
  RTMP:      rtmp://$PUBLIC_IPV4:1935/live/camera1
  ATENÇÃO: Troque a senha padrão (admin/changeme123)
  ==============================================
